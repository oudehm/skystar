<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events — Skystar</title>
<link rel="stylesheet" href="shared.css"> <!-- shared colors, fonts, header/footer -->
<style>
  /* locks the page to the screen height so only the event list scrolls */
  html, body { height: 100%; overflow: hidden; }
  body { display: flex; flex-direction: column; }

  /* the scrollable content area between header and footer */
  main { flex: 1; overflow-y: auto; padding: 50px 60px; }

  /* centers and caps the width of the event list */
  .events-list { max-width: 800px; margin: 0 auto; }

  /* each individual event row — 3 columns: date | details | status button */
  .event {
    display: grid;
    grid-template-columns: 90px 1fr auto;
    gap: 32px;
    align-items: center;
    padding: 26px 0;
    border-top: 1px solid var(--line);
  }
  /* adds a bottom border to the very last event */
  .event:last-child { border-bottom: 1px solid var(--line); }

  /* the date block on the left (month + day number) */
  .event .date { text-align: center; }
  .event .date .month { font-size: 0.7rem; letter-spacing: 0.3em; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
  .event .date .day { font-weight: 300; font-size: 2.4rem; line-height: 1; }

  /* event name and location/time details */
  .event h3 { font-weight: 400; font-size: 1.25rem; margin-bottom: 6px; }
  .event .details { font-size: 0.85rem; color: var(--muted); line-height: 1.5; }
  .event .details .sep { margin: 0 8px; color: var(--line); } /* the · dot between venue and time */

  /* the "RSVP" pill on the right side of each event */
  .event .status {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 6px 14px;
    border: 1px solid var(--ink);
    color: var(--ink);
    white-space: nowrap; /* prevents text from wrapping */
  }

  /* shown when there are no upcoming events */
  .empty-note { text-align: center; font-style: italic; color: var(--muted); margin-top: 30px; font-size: 0.85rem; }

  /* on mobile, collapse to 2 columns (hide the status button below the details) */
  @media (max-width: 900px) {
    main { padding: 30px 24px; }
    .event { grid-template-columns: 70px 1fr; gap: 18px; }
    .event .status { grid-column: 2; justify-self: start; margin-top: 6px; }
  }
</style>
</head>
<body>

<!-- nav bar -->
<header>
  <div class="logo-wrap">
    <div class="logo-row">
      <div class="logo">Skystar</div>
      <img class="header-flower" src="flowers.png" alt="">
    </div>
    <div class="tagline">Handmade · Est. 2026</div>
  </div>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="inventory.html">Lookbook</a></li>
      <li><a href="popups.html" class="active">Events</a></li>
      <li><a href="interest.html">Request</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
</header>

<main>
  <!-- page title -->
  <div class="page-header">
    <div class="eyebrow">In Person Only</div>
    <h1>Upcoming <em>pop-ups</em></h1>
    <p>Come visit. Try the bags in person.</p>
  </div>

  <!-- event rows are injected here by the script below -->
  <div class="events-list" id="eventsList"></div>

  <!-- shown when the API returns no events, or on error -->
  <p class="empty-note" id="emptyNote">More dates announced on Instagram.</p>
</main>

<footer>
  <div>© 2026 <span class="script">Skystar</span></div>
  <div>Sacramento, CA <span class="divider">·</span> @[your instagram]</div>
  <a href="admin.html" style="font-size:0.6rem;letter-spacing:0.2em;color:var(--line);text-decoration:none;text-transform:uppercase;transition:color 0.2s;" onmouseover="this.style.color='var(--muted)'" onmouseout="this.style.color='var(--line)'">Admin</a>
</footer>

<script>
  const list      = document.getElementById('eventsList');
  const emptyNote = document.getElementById('emptyNote');

  /* hide the empty note by default — show it only if there's nothing to display */
  emptyNote.style.display = 'none';

  async function loadEvents() {
    try {
      const res    = await fetch('http://localhost:8000/api/events');
      const events = await res.json();

      if (!events.length) {
        emptyNote.style.display = 'block';
        return;
      }

      events.forEach(function(ev) {
        /* parse the date field to extract a short month name and numeric day */
        const d     = new Date(ev.date);
        const month = d.toLocaleDateString('en-US', { month: 'short' }).toUpperCase();
        const day   = d.getDate();

        const row = document.createElement('div');
        row.className = 'event';
        row.innerHTML =
          '<div class="date">' +
            '<div class="month">' + month + '</div>' +
            '<div class="day">'   + day   + '</div>' +
          '</div>' +
          '<div>' +
            '<h3>' + ev.name + '</h3>' +
            '<div class="details">' + ev.venue +
              ' <span class="sep">·</span> ' + ev.startTime + ' – ' + ev.endTime +
            '</div>' +
          '</div>' +
          '<div class="status">RSVP</div>';

        list.appendChild(row);
      });

    } catch (err) {
      /* network or parse error — fall back to the empty note */
      emptyNote.textContent  = 'Could not load events. Check back soon or find us on Instagram.';
      emptyNote.style.display = 'block';
    }
  }

  loadEvents();
</script>

</body>
</html>
